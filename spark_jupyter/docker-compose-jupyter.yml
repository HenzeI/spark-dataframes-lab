services:
  spark-master:
    image: profesorbigdata/spark-base-image_4_1_1_new:latest
    container_name: spark-master
    hostname: spark-master
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
      SPARK_NO_DAEMONIZE: "1"
    command:
      - /bin/bash
      - -lc
      - |
        mkdir -p /tmp/spark-events
        echo "spark.eventLog.enabled true" > /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-defaults.conf
        echo "spark.eventLog.dir file:///tmp/spark-events" >> /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-defaults.conf
        echo "spark.history.fs.logDirectory file:///tmp/spark-events" >> /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-defaults.conf
        echo "spark.history.ui.port 18080" >> /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-defaults.conf
        echo "export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" > /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-env.sh
        echo "export SPARK_MASTER_HOST=spark-master" >> /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-env.sh
        echo "export SPARK_MASTER_PORT=7077" >> /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-env.sh
        echo "export SPARK_MASTER_WEBUI_PORT=8080" >> /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-env.sh
        exec /opt/bd/spark-4.1.1-bin-hadoop3/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8080
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - spark-events:/tmp/spark-events
      - ./apps:/opt/spark-apps
    networks:
      - spark-net

  spark-worker-1:
    image: profesorbigdata/spark-base-image_4_1_1_new:latest
    container_name: spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    environment:
      SPARK_NO_DAEMONIZE: "1"
    command:
      - /bin/bash
      - -lc
      - |
        mkdir -p /tmp/spark-events
        echo "export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" > /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-env.sh
        exec /opt/bd/spark-4.1.1-bin-hadoop3/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --webui-port 8081
    ports:
      - "8081:8081"
    volumes:
      - spark-events:/tmp/spark-events
      - ./apps:/opt/spark-apps
    networks:
      - spark-net

  spark-worker-2:
    image: profesorbigdata/spark-base-image_4_1_1_new:latest
    container_name: spark-worker-2
    hostname: spark-worker-2
    depends_on:
      - spark-master
    environment:
      SPARK_NO_DAEMONIZE: "1"
    command:
      - /bin/bash
      - -lc
      - |
        mkdir -p /tmp/spark-events
        echo "export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" > /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-env.sh
        exec /opt/bd/spark-4.1.1-bin-hadoop3/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --webui-port 8081
    ports:
      - "8082:8081"
    volumes:
      - spark-events:/tmp/spark-events
      - ./apps:/opt/spark-apps
    networks:
      - spark-net

  spark-history:
    image: profesorbigdata/spark-base-image_4_1_1_new:latest
    container_name: spark-history
    hostname: spark-history
    depends_on:
      - spark-master
    environment:
      SPARK_NO_DAEMONIZE: "1"
    command:
      - /bin/bash
      - -lc
      - |
        mkdir -p /tmp/spark-events
        echo "spark.history.fs.logDirectory file:///tmp/spark-events" > /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-defaults.conf
        echo "spark.history.ui.port 18080" >> /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-defaults.conf
        echo "export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" > /opt/bd/spark-4.1.1-bin-hadoop3/conf/spark-env.sh
        exec /opt/bd/spark-4.1.1-bin-hadoop3/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    ports:
      - "18080:18080"
    volumes:
      - spark-events:/tmp/spark-events
      - ./apps:/opt/spark-apps
    networks:
      - spark-net

  spark-notebook:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    image: spark-notebook-local:4.1.1
    container_name: spark-notebook
    hostname: spark-notebook
    depends_on:
      - spark-master
    environment:
      PYSPARK_PYTHON: python3
      PYSPARK_DRIVER_PYTHON: python3
      SPARK_MASTER_URL: spark://spark-master:7077
    ports:
      - "8888:8888"
      - "4040:4040"
      - "4041:4041"
      - "4042:4042"
      - "4043:4043"
      - "4044:4044"
      - "4045:4045"
    volumes:
      - ./notebooks:/opt/notebooks
      - ./apps:/opt/spark-apps
      - spark-events:/tmp/spark-events
    working_dir: /opt/notebooks
    networks:
      - spark-net

volumes:
  spark-events:

networks:
  spark-net:
    driver: bridge

